<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='88'>📋</text></svg>">
<title>지원사업 통합 대시보드</title>
<style>
  :root {
    --bg: #f4f6fa;
    --card: #ffffff;
    --text: #1a2233;
    --text-sub: #6b7688;
    --line: #e3e8f0;
    --accent: #2563eb;
    --accent-soft: #eff4ff;
    --unread-bar: #2563eb;
    --read-text: #9aa3b2;
    --new: #ef4444;
    --chip-bg: #eef1f6;
    --chip-on: #2563eb;
    --shadow: 0 1px 3px rgba(16,24,40,.06), 0 1px 2px rgba(16,24,40,.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Pretendard", "Malgun Gothic", "맑은 고딕", -apple-system, "Segoe UI", sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 20px 16px 80px; }

  /* ---------- 왼쪽 사이트 바로가기 사이드바 ---------- */
  .sitenav {
    position: fixed; left: 14px; top: 18px; width: 196px; max-height: calc(100vh - 36px);
    overflow-y: auto; background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 12px 10px 14px; box-shadow: var(--shadow); z-index: 50;
  }
  .sitenav h3 { font-size: 13px; font-weight: 800; margin: 2px 6px 8px; color: var(--text); }
  .sitenav .sub { font-size: 11px; font-weight: 700; color: var(--text-sub); margin: 10px 6px 4px; }
  .sitenav a {
    display: flex; align-items: center; gap: 7px; padding: 6px 8px; border-radius: 8px;
    text-decoration: none; color: #4b5568; font-size: 12.5px;
  }
  .sitenav a:hover { background: var(--accent-soft); color: var(--accent); }
  .sitenav .snm { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sitenav .sarrow { opacity: .45; font-size: 11px; }
  @media (max-width: 1520px) { .sitenav { display: none; } }

  /* ---------- header ---------- */
  header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 10px; margin-bottom: 6px; }
  header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  header .updated { font-size: 12.5px; color: var(--text-sub); }
  .statbar { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 16px; align-items: center; }
  .statbox {
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 6px 14px; font-size: 13px; color: var(--text-sub); box-shadow: var(--shadow);
  }
  .statbox b { color: var(--text); font-size: 15px; margin-left: 4px; }
  .statbox.unread b { color: var(--accent); }
  .statbox.clickable { cursor: pointer; user-select: none; }
  .statbox.clickable:hover { border-color: var(--accent); }
  .statbox.clickable.on { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
  .statbox.saved.on { border-color: #f7d774; background: #fffbeb; color: #b8860b; }
  .statbox.saved.on b { color: #b8860b; }
  .statbar .spacer { flex: 1; }
  button.ghost {
    border: 1px solid var(--line); background: var(--card); color: var(--text-sub);
    border-radius: 10px; padding: 7px 12px; font-size: 13px; cursor: pointer; box-shadow: var(--shadow);
  }
  button.ghost:hover { color: var(--accent); border-color: var(--accent); }
  button.ghost.accent { color: var(--accent); border-color: #cfe0ff; font-weight: 700; }
  button.ghost.accent.solid { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.ghost.accent.solid:hover { background: #1d4fd6; color: #fff; }

  /* add-site form */
  .fld { display: block; margin-bottom: 11px; }
  .fld > span { display: block; font-size: 12.5px; font-weight: 700; color: var(--text-sub); margin-bottom: 4px; }
  .fld input[type=text], .fld input[type=url], .fld select {
    width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px;
    font-size: 14px; font-family: inherit; outline: none;
  }
  .fld input:focus, .fld select:focus { border-color: var(--accent); }
  .fld-row { display: flex; gap: 10px; }
  .fld.half { flex: 1; }
  .fld.chk { display: flex; align-items: center; gap: 7px; margin-top: 22px; }
  .fld.chk input { width: 16px; height: 16px; accent-color: var(--accent); }
  .fld.chk span { margin: 0; font-weight: 600; color: var(--text); }
  .add-actions { display: flex; gap: 8px; margin: 6px 0 4px; }
  .add-actions button { flex: 1; padding: 10px; border-radius: 9px; cursor: pointer; font-size: 14px; font-family: inherit; }
  .add-result { font-size: 13px; margin: 8px 0; min-height: 4px; }
  .add-result .good { color: #0e9f6e; font-weight: 700; }
  .add-result .bad { color: #dc2626; font-weight: 700; }
  .add-result ul { margin: 6px 0 0; padding-left: 17px; color: var(--text-sub); }
  .add-result li { margin: 2px 0; }
  .add-divider { font-size: 12px; font-weight: 800; color: var(--text-sub); margin: 16px 0 8px; border-top: 1px solid var(--line); padding-top: 12px; }
  .custom-list:empty::after { content: "아직 없습니다."; color: var(--text-sub); font-size: 12.5px; }
  .crow { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .crow:last-child { border-bottom: none; }
  .crow .cnm { font-weight: 600; }
  .crow .ctag { font-size: 11px; color: var(--text-sub); background: var(--chip-bg); border-radius: 5px; padding: 1px 6px; }
  .crow .cdel { margin-left: auto; border: none; background: none; color: #c0451b; cursor: pointer; font-size: 12.5px; }
  .crow .cdel:hover { text-decoration: underline; }

  /* ---------- filters ---------- */
  .filters {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 18px; box-shadow: var(--shadow);
    display: flex; flex-direction: column; gap: 10px;
  }
  .filter-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .filter-row .label { font-size: 12px; font-weight: 700; color: var(--text-sub); width: 42px; flex-shrink: 0; }
  .chip {
    border: 1px solid var(--line); background: var(--chip-bg); color: var(--text-sub);
    border-radius: 999px; padding: 4px 12px; font-size: 13px; cursor: pointer; user-select: none;
    transition: all .12s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.on { background: var(--chip-on); border-color: var(--chip-on); color: #fff; font-weight: 600; }
  .chip .chipn { margin-left: 5px; font-size: 11px; font-weight: 700; opacity: .65; }
  .chip.on .chipn { opacity: .9; }
  .rescount { font-size: 13px; font-weight: 700; color: var(--text-sub); margin: 0 2px 10px; }
  .filter-row2 { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .filter-row2 input[type=search] {
    flex: 1; min-width: 180px; border: 1px solid var(--line); border-radius: 10px;
    padding: 8px 12px; font-size: 14px; font-family: inherit; outline: none;
  }
  .filter-row2 input[type=search]:focus { border-color: var(--accent); }
  .filter-row2 select {
    border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px;
    font-size: 13px; font-family: inherit; background: #fff; color: var(--text); outline: none; max-width: 190px;
  }
  label.toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-sub); cursor: pointer; white-space: nowrap; }
  label.toggle input { accent-color: var(--accent); width: 15px; height: 15px; }

  /* ---------- cards ---------- */
  .list { display: flex; flex-direction: column; gap: 10px; }
  .card {
    position: relative; display: block; background: var(--card);
    border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px 12px 20px;
    text-decoration: none; color: inherit; box-shadow: var(--shadow);
    transition: transform .08s, box-shadow .12s;
  }
  .card:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(16,24,40,.1); }
  .card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    border-radius: 12px 0 0 12px; background: var(--unread-bar);
  }
  .card .title { font-size: 15.5px; font-weight: 700; letter-spacing: -0.2px; word-break: keep-all; }
  .card .meta { display: flex; flex-wrap: wrap; gap: 6px 12px; margin-top: 7px; align-items: center; font-size: 12.5px; color: var(--text-sub); }
  .card .src { font-weight: 600; color: #4b5568; }
  .tag {
    display: inline-block; border-radius: 6px; padding: 1.5px 8px; font-size: 11.5px; font-weight: 600;
    background: var(--chip-bg); color: #5a6474;
  }
  .tag.region { background: #e7f0ff; color: #1d4ed8; }
  .tag.region.busan { background: #e6f7f1; color: #0e9f6e; }
  .badge-new {
    display: inline-block; background: var(--new); color: #fff; font-size: 10.5px; font-weight: 800;
    border-radius: 5px; padding: 1px 6px; margin-right: 7px; vertical-align: 2px; letter-spacing: .5px;
  }
  .dday { font-weight: 700; border-radius: 6px; padding: 1.5px 8px; font-size: 11.5px; background: #f1f3f7; color: #5a6474; }
  .dday.warn { background: #fff3e0; color: #d97706; }
  .dday.danger { background: #fee2e2; color: #dc2626; }
  .dday.closed { background: #f1f3f7; color: #9aa3b2; text-decoration: line-through; }

  /* read state */
  .card.read { background: #fafbfc; border-color: #eceff4; }
  .card.read::before { background: #d4dae3; }
  .card.read .title { color: var(--read-text); font-weight: 500; }
  .card.read .meta, .card.read .src { color: #b3bac5; }
  .card.read .tag, .card.read .dday { opacity: .55; }
  .card.read:hover { transform: none; }

  .readbtn {
    position: absolute; right: 12px; top: 12px; border: 1px solid var(--line); background: #fff;
    color: #b3bac5; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
  }
  .readbtn:hover { border-color: var(--accent); color: var(--accent); }
  .card.read .readbtn { color: var(--accent); background: var(--accent-soft); border-color: transparent; }
  .savebtn {
    position: absolute; right: 48px; top: 12px; border: 1px solid var(--line); background: #fff;
    color: #c9ced8; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }
  .savebtn:hover { border-color: #f5b301; color: #f5b301; }
  .savebtn.on { color: #f5b301; border-color: #f7d774; background: #fffbeb; }
  .sharebtn {
    position: absolute; right: 84px; top: 12px; border: 1px solid var(--line); background: #fff;
    color: #b3bac5; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }
  .sharebtn:hover { border-color: var(--accent); color: var(--accent); }
  .card .title { padding-right: 106px; display: block; text-decoration: none; color: inherit; }
  a.title:hover { color: var(--accent); }

  /* ---------- 공유 팝업 ---------- */
  .sharebox {
    width: 92vw; max-width: 400px; background: #fff; border-radius: 16px; padding: 18px 18px 20px;
    box-shadow: 0 20px 50px rgba(16,24,40,.35);
  }
  .share-h { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .share-h b { font-size: 16px; }
  .share-h button { border: none; background: none; font-size: 19px; color: var(--text-sub); cursor: pointer; }
  .share-title { font-size: 13.5px; color: var(--text-sub); line-height: 1.5; margin-bottom: 16px; word-break: keep-all;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .share-btns { display: flex; gap: 10px; margin-bottom: 14px; }
  .share-btns button {
    flex: 1; border: 1px solid var(--line); background: #fff; border-radius: 12px; padding: 14px 6px;
    cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit; color: var(--text);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .share-btns button:hover { border-color: var(--accent); background: var(--accent-soft); }
  .share-btns .ico { font-size: 24px; }
  .share-btns .kakao { background: #fee500; border-color: #fee500; }
  .share-btns .kakao:hover { background: #fada0a; border-color: #fada0a; }
  .share-btns .tele { background: #eaf5fd; border-color: #cfe8fa; }
  .share-url { display: flex; gap: 8px; }
  .share-url input {
    flex: 1; border: 1px solid var(--line); border-radius: 10px; padding: 9px 11px; font-size: 12.5px;
    font-family: inherit; color: var(--text-sub); background: #f7f9fc; outline: none;
  }
  .share-url button {
    border: 1px solid var(--accent); background: var(--accent); color: #fff; border-radius: 10px;
    padding: 0 16px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap;
  }
  .share-msg { font-size: 12.5px; color: #0e9f6e; font-weight: 700; margin-top: 10px; min-height: 16px; text-align: center; }

  /* source badges */
  .srcbadges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; align-items: center; }
  .srcbadge {
    display: inline-flex; align-items: center; gap: 3px; text-decoration: none;
    background: var(--accent-soft); color: var(--accent); border: 1px solid #d6e2ff;
    border-radius: 7px; padding: 2.5px 9px; font-size: 12px; font-weight: 700; white-space: nowrap;
  }
  .srcbadge:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .srcbadge .ext { font-size: 10px; opacity: .7; }
  .dupflag {
    display: inline-flex; align-items: center; gap: 3px; background: #fef3c7; color: #b45309;
    border: 1px solid #fde68a; border-radius: 7px; padding: 2.5px 8px; font-size: 12px; font-weight: 700;
  }
  .card.read .srcbadge { background: #f1f3f7; color: #9aa3b2; border-color: #e6e9ef; }
  .card.read .dupflag { opacity: .5; }

  .empty { text-align: center; color: var(--text-sub); padding: 60px 0; font-size: 14px; }

  /* ---------- link-only sources ---------- */
  .section-title { font-size: 15px; font-weight: 800; margin: 34px 0 10px; color: var(--text); }
  .linkgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
  .linkcard {
    display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 13px; text-decoration: none; color: var(--text-sub); font-size: 13px;
  }
  .linkcard:hover { color: var(--accent); border-color: var(--accent); }
  .linkcard .nm { font-weight: 600; }
  .linkcard .arrow { margin-left: auto; }

  /* ---------- source status modal ---------- */
  dialog {
    position: fixed; inset: 0; margin: auto;   /* * {margin:0} 리셋이 지운 중앙정렬 복구 */
    border: none; border-radius: 14px; padding: 0; max-width: 520px; width: calc(100vw - 40px);
    box-shadow: 0 20px 50px rgba(16,24,40,.25);
  }
  dialog::backdrop { background: rgba(16,24,40,.4); }
  .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 16px 18px 10px; }
  .modal-head h2 { font-size: 16px; }
  .modal-body { padding: 0 18px 18px; max-height: 60vh; overflow-y: auto; }
  .srcrow { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .srcrow:last-child { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.ok { background: #10b981; } .dot.fail { background: #ef4444; } .dot.link { background: #9aa3b2; }
  .srcrow .cnt { margin-left: auto; color: var(--text-sub); }
  .srcrow a { color: inherit; text-decoration: none; }
  .srcrow a:hover { color: var(--accent); }
  .modal-info {
    background: var(--accent-soft); border: 1px solid #d6e2ff; border-radius: 10px;
    padding: 11px 13px; margin-bottom: 12px; font-size: 12.5px; color: #33507d; line-height: 1.6;
  }
  .modal-info .when { font-weight: 800; color: var(--accent); font-size: 13px; }
  .modal-info ul { margin: 6px 0 0; padding-left: 16px; }
  .modal-info li { margin: 1px 0; }
  .modal-legend { display: flex; gap: 12px; margin: 2px 0 10px; font-size: 11.5px; color: var(--text-sub); flex-wrap: wrap; }
  .modal-legend span { display: inline-flex; align-items: center; gap: 4px; }

  .notice {
    background: #fff8e6; border: 1px solid #f5dfa6; color: #8a6d1a; border-radius: 12px;
    padding: 14px 16px; font-size: 13.5px; margin-bottom: 16px;
  }

  /* ---------- detail (안내) 전체 페이지 — dialog 대신 단순 오버레이 ---------- */
  .doverlay {
    position: fixed; inset: 0; z-index: 9999; background: rgba(16,24,40,.55);
    display: flex; align-items: center; justify-content: center;
  }
  .dbox {
    width: 96vw; max-width: 1040px; height: 94vh;
    background: #fff; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 20px 50px rgba(16,24,40,.35);
  }
  .d-topbar {
    display: flex; align-items: center; gap: 12px; padding: 11px 16px; flex-shrink: 0;
    border-bottom: 1px solid var(--line); background: #fff;
  }
  .d-back {
    display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--line); background: #fff;
    border-radius: 10px; padding: 8px 15px; font-size: 14px; font-weight: 700; cursor: pointer; color: var(--text);
  }
  .d-back:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .d-topttl { flex: 1; font-size: 13px; color: var(--text-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .d-x { border: none; background: none; font-size: 20px; color: var(--text-sub); cursor: pointer; width: 36px; height: 36px; border-radius: 9px; line-height: 1; }
  .d-x:hover { background: var(--chip-bg); color: var(--text); }
  .d-scroll { overflow-y: auto; flex: 1; background: #fbfcfe; }
  .d-page { max-width: 880px; margin: 0 auto; padding: 26px 28px 56px; }
  .d-page h1 { font-size: 22px; font-weight: 800; line-height: 1.42; letter-spacing: -0.3px; word-break: keep-all; margin-bottom: 12px; color: var(--text); }
  .d-meta { display: flex; flex-wrap: wrap; gap: 6px 10px; align-items: center; font-size: 13px; color: var(--text-sub); margin-bottom: 18px; }

  .d-links { display: flex; flex-wrap: wrap; gap: 9px; margin-bottom: 18px; }
  .d-links a {
    display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
    background: var(--accent); color: #fff; border-radius: 10px; padding: 11px 18px; font-size: 14px; font-weight: 700;
  }
  .d-links a:hover { background: #1d4fd6; }
  .d-sharebtn {
    border: 1px solid var(--line); background: #fff; color: var(--text); border-radius: 10px;
    padding: 11px 18px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .d-sharebtn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

  .d-card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .d-card-t { font-size: 14px; font-weight: 800; margin-bottom: 11px; color: var(--text); display: flex; align-items: center; gap: 7px; }
  .d-file {
    display: flex; align-items: center; gap: 11px; text-decoration: none; color: var(--text);
    border: 1px solid var(--line); border-radius: 11px; padding: 12px 14px; margin-bottom: 8px; background: #fff; transition: all .1s;
  }
  .d-file:last-child { margin-bottom: 0; }
  .d-file:hover { border-color: var(--accent); background: var(--accent-soft); transform: translateY(-1px); }
  .d-ext {
    flex-shrink: 0; font-size: 11px; font-weight: 800; color: #fff; background: #8a94a6;
    border-radius: 6px; padding: 4px 9px; min-width: 46px; text-align: center; letter-spacing: .3px;
  }
  .d-ext.pdf { background: #dc2626; } .d-ext.hwp, .d-ext.hwpx { background: #2563eb; }
  .d-ext.xls, .d-ext.xlsx, .d-ext.cell { background: #0e9f6e; }
  .d-ext.doc, .d-ext.docx { background: #1d4ed8; }
  .d-ext.ppt, .d-ext.pptx, .d-ext.show { background: #ea580c; }
  .d-ext.zip { background: #6b7280; }
  .d-fn { flex: 1; font-size: 14px; word-break: break-all; font-weight: 500; }
  .d-dl { flex-shrink: 0; font-size: 13px; color: var(--accent); font-weight: 700; white-space: nowrap; }

  .d-loading, .d-empty { color: var(--text-sub); font-size: 14px; padding: 30px 0; text-align: center; line-height: 1.7; }
  .d-content { font-size: 14.5px; line-height: 1.75; color: #2b3444; word-break: break-word; }
  .d-content img { max-width: 100%; height: auto; border-radius: 6px; }
  .d-content table { border-collapse: collapse; width: 100%; max-width: 100%; margin: 10px 0; display: block; overflow-x: auto; }
  .d-content td, .d-content th { border: 1px solid var(--line); padding: 7px 10px; font-size: 13.5px; }
  .d-content th { background: #f4f6fa; }
  .d-content a { color: var(--accent); }
  .d-content a.d-inline-file {
    display: inline-flex; align-items: center; gap: 5px; text-decoration: none; font-weight: 700;
    background: var(--accent-soft); border: 1px solid #d6e2ff; border-radius: 8px; padding: 3px 10px; margin: 2px 0;

  .d-content a.d-inline-file::before { content: "⬇"; font-size: 12px; }

<script src="설정.js"></script>
<script src="data.js"></script>
<script>
(function () {
  const app = document.getElementById('app');

  if (!window.BIZ_DATA || !Array.isArray(window.BIZ_DATA.items)) {
    app.innerHTML = '<div class="notice">아직 수집된 데이터가 없습니다.<br>' +
      '<b>업데이트.bat</b> 파일을 더블클릭해서 첫 수집을 실행한 뒤 이 페이지를 새로고침하세요.</div>';
    return;
  }

  const DATA = window.BIZ_DATA;
  const READ_KEY = 'bizdash_read_v1';
  const SAVED_KEY = 'bizdash_saved_v1';
  const FILTER_KEY = 'bizdash_filter_v1';
  const NEW_DAYS = 3; // firstSeen 이내면 NEW 배지

  // ---------- state ----------
  let readMap = {};
  try { readMap = JSON.parse(localStorage.getItem(READ_KEY) || '{}'); } catch (e) { readMap = {}; }

  let f = { region: '전체', cat: '전체', source: '전체', q: '', sort: 'unread', unreadOnly: false, view: 'all', hideClosed: true };
  try { f = Object.assign(f, JSON.parse(localStorage.getItem(FILTER_KEY) || '{}')); } catch (e) {}

  // 데이터에 없는 오래된 읽음 기록 정리 (6개월 이상)
  (function prune() {
    const ids = new Set(DATA.items.map(i => i.id));
    const cutoff = Date.now() - 1000 * 60 * 60 * 24 * 183;
    let changed = false;
    for (const id of Object.keys(readMap)) {
      if (!ids.has(id) && readMap[id] < cutoff) { delete readMap[id]; changed = true; }
    }
    if (changed) saveRead();
  })();

  function saveRead() { localStorage.setItem(READ_KEY, JSON.stringify(readMap)); }
  function saveFilter() { localStorage.setItem(FILTER_KEY, JSON.stringify(f)); }

  // ---------- helpers ----------
  const todayStr = new Date().toISOString().slice(0, 10);
  function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }
  function fmtDate(s) { return s ? s.replaceAll('-', '.') : ''; }
  function fmtDateTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return '';
    const p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}.${p(d.getMonth() + 1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }
  function esc(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function ddayHtml(item) {
    if (!item.deadline) return '';
    const d = daysBetween(todayStr, item.deadline);
    if (d < 0) return '<span class="dday closed">마감</span>';
    if (d === 0) return '<span class="dday danger">오늘 마감</span>';
    const cls = d <= 3 ? 'danger' : d <= 7 ? 'warn' : '';
    return `<span class="dday ${cls}">D-${d}</span>`;
  }

  const CATS = ['사업화', 'R&D', '투자', '네트워킹', '입주기업', '특허·지재권', '홍보·마케팅', '기타'];
  const REGIONS = ['부산', '전국', '기타'];

  const sources = (DATA.sources || []).slice().sort((a, b) => a.name.localeCompare(b.name, 'ko'));
  const scrapedSources = sources.filter(s => s.status !== 'link-only');
  const linkOnlySources = sources.filter(s => s.status === 'link-only');

  // ---------- 중복 공고 묶기 ----------
  // 제목을 정규화(공백·괄호·기호·연도 제거)해 같은 공고를 여러 사이트에서 하나로 묶는다.
  function normKey(title) {
    let t = (title || '').toLowerCase();
    // 앞머리의 사이트별 [태그] 들만 제거 ([공고],[모집],[부산] 등). 문장 중간 괄호·숫자·회차는
    // 서로 다른 공고를 구분하는 핵심 정보이므로 보존한다. (북구/사하구, 제2차/제3차 오병합 방지)
    t = t.replace(/^\s*(\[[^\]]*\]\s*)+/, '');
    // 구분기호·공백만 제거하고 괄호 '안'의 텍스트(북구, 2차 등)는 남긴다.
    t = t.replace(/[^0-9a-z가-힣]/g, '');
    return t;
  }

  const GROUPS = (function buildGroups() {
    const map = new Map();
    for (const it of DATA.items) {
      const k = normKey(it.title);
      // 정규화 결과가 너무 짧으면(=구분력 없음) 병합하지 않고 단독 처리
      const key = k.length >= 8 ? 'K:' + k : 'U:' + it.id;
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(it);
    }
    const groups = [];
    for (const [sid, members] of map.entries()) {
      // 최신 등록일 멤버를 대표로
      members.sort((a, b) => (b.date || b.firstSeen || '').localeCompare(a.date || a.firstSeen || ''));
      const primary = members[0];
      // 표시용 출처 목록 (사이트별 1개, 대표 URL)
      const bySrc = new Map();
      for (const m of members) if (!bySrc.has(m.source)) bySrc.set(m.source, m);
      const cats = [...new Set(members.flatMap(m => m.categories || []))];
      const regions = [...new Set(members.map(m => m.region))];
      const dates = members.map(m => m.date || m.firstSeen).filter(Boolean);
      const firsts = members.map(m => m.firstSeen).filter(Boolean);
      const futureDl = members.map(m => m.deadline).filter(d => d && d >= todayStr).sort();
      groups.push({
        sid,                                 // 저장/식별용 안정 키 (정규화 제목 기반)
        key: primary.id,
        title: primary.title,
        memberIds: members.map(m => m.id),
        srcList: [...bySrc.values()].map(m => ({ source: m.source, sourceName: m.sourceName, url: m.url })),
        date: dates.sort().slice(-1)[0] || null,
        firstSeen: firsts.sort()[0] || null,
        deadline: futureDl[0] || (members.map(m => m.deadline).filter(Boolean).sort().slice(-1)[0]) || null,
        region: primary.region || regions[0] || '기타',
        regions, categories: cats,
      });
    }
    return groups;
  })();

  const liveBySid = {};
  GROUPS.forEach(g => liveBySid[g.sid] = g);

  const groupRead = g => !!g && (g.memberIds || []).length > 0 && g.memberIds.every(id => readMap[id]);
  function setGroupRead(g, read) {
    if (!g || !g.memberIds) return;
    for (const id of g.memberIds) { if (read) readMap[id] = Date.now(); else delete readMap[id]; }
  }
  // 접수 마감이 지난(=이미 끝난) 공고인지. 마감일이 없으면(상시 등) 유효로 본다.
  const isClosed = g => !!(g && g.deadline && g.deadline < todayStr);
  // '전체' 뷰의 기준 목록: 기본은 마감 지난 것 제외
  const openBase = () => f.hideClosed ? GROUPS.filter(g => !isClosed(g)) : GROUPS;

  // 특정 지역/유형을 선택했을 때 몇 건이 되는지(다른 필터는 유지) — 칩 개수 표시용
  function countFor(dim, value) {
    const q = f.q.trim().toLowerCase();
    const base = f.view === 'saved' ? savedGroups() : openBase();
    const region = dim === 'region' ? value : f.region;
    const cat = dim === 'cat' ? value : f.cat;
    return base.filter(g => {
      if (region !== '전체' && !(g.regions || []).includes(region)) return false;
      if (cat !== '전체' && !(g.categories || []).includes(cat)) return false;
      if (f.source !== '전체' && !(g.srcList || []).some(s => s.source === f.source)) return false;
      if (f.unreadOnly && groupRead(g)) return false;
      if (q && !((g.title || '').toLowerCase().includes(q) ||
                 (g.srcList || []).some(s => (s.sourceName || '').toLowerCase().includes(q)))) return false;
      return true;
    }).length;
  }

  // ---------- 저장(북마크) ----------
  // 저장한 공고는 스냅샷으로 보관 → 나중에 목록에서 사라져도(마감·삭제) 저장함에 남는다.
  let savedMap = {};
  try { savedMap = JSON.parse(localStorage.getItem(SAVED_KEY) || '{}'); } catch (e) { savedMap = {}; }
  function saveSaved() { localStorage.setItem(SAVED_KEY, JSON.stringify(savedMap)); }
  const groupSaved = g => !!savedMap[g.sid];
  function toggleSave(g) {
    if (savedMap[g.sid]) { delete savedMap[g.sid]; }
    else {
      savedMap[g.sid] = {
        sid: g.sid, key: g.key, title: g.title, memberIds: g.memberIds,
        srcList: g.srcList, date: g.date, firstSeen: g.firstSeen, deadline: g.deadline,
        region: g.region, regions: g.regions, categories: g.categories, savedAt: Date.now(),
      };
    }
    saveSaved();
  }
  // 저장함 뷰용 그룹 목록: 살아있으면 최신 그룹, 없으면 저장 스냅샷 사용
  function savedGroups() {
    return Object.values(savedMap)
      .sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0))
      .map(snap => liveBySid[snap.sid] || snap);
  }

  // ---------- render ----------
  function build() {
    const base = openBase();
    const total = base.length;
    const unread = base.filter(g => !groupRead(g)).length;

    const savedCnt = Object.keys(savedMap).length;
    const inSaved = f.view === 'saved';
    let html = '';
    html += `<div class="statbar">
      <div class="statbox clickable ${!inSaved ? 'on' : ''}" data-view="all">전체 공고<b>${total}</b></div>
      <div class="statbox unread">미확인<b id="unreadCnt">${unread}</b></div>
      <div class="statbox clickable saved ${inSaved ? 'on' : ''}" data-view="saved">⭐ 저장함<b>${savedCnt}</b></div>
      <div class="spacer"></div>
      <button class="ghost accent" id="btnAdd">＋ 사이트 추가</button>
      <button class="ghost" id="btnSrc">수집 상태</button>
      <button class="ghost" id="btnAllRead">모두 읽음</button>
    </div>`;

    // filters
    html += '<div class="filters">';
    html += '<div class="filter-row"><span class="label">지역</span>' +
      ['전체', ...REGIONS].map(r => `<span class="chip ${f.region === r ? 'on' : ''}" data-k="region" data-v="${r}">${r}<b class="chipn">${countFor('region', r)}</b></span>`).join('') + '</div>';
    html += '<div class="filter-row"><span class="label">유형</span>' +
      ['전체', ...CATS].map(c => `<span class="chip ${f.cat === c ? 'on' : ''}" data-k="cat" data-v="${c}">${c}<b class="chipn">${countFor('cat', c)}</b></span>`).join('') + '</div>';
    html += `<div class="filter-row2">
      <input type="search" id="q" placeholder="공고 제목 검색…" value="${esc(f.q)}">
      <select id="srcSel"><option value="전체">출처: 전체</option>` +
      scrapedSources.map(s => `<option value="${esc(s.id)}" ${f.source === s.id ? 'selected' : ''}>${esc(s.name)}</option>`).join('') +
      `</select>
      <select id="sortSel">
        <option value="unread" ${f.sort === 'unread' ? 'selected' : ''}>미확인 · 최신순</option>
        <option value="date" ${f.sort === 'date' ? 'selected' : ''}>최신순</option>
        <option value="dday" ${f.sort === 'dday' ? 'selected' : ''}>마감 임박순</option>
      </select>
      <label class="toggle"><input type="checkbox" id="unreadOnly" ${f.unreadOnly ? 'checked' : ''}>안 읽은 것만</label>
      <label class="toggle"><input type="checkbox" id="showClosed" ${!f.hideClosed ? 'checked' : ''}>마감 포함</label>
    </div>`;
    html += '</div>';

    html += '<div class="rescount" id="rescount"></div>';
    html += '<div class="list" id="list"></div>';

    if (linkOnlySources.length) {
      html += '<div class="section-title">🔗 직접 확인이 필요한 사이트 (자동수집 미지원)</div><div class="linkgrid">' +
        linkOnlySources.map(s => `<a class="linkcard" href="${esc(s.url)}" target="_blank" rel="noopener"><span class="nm">${esc(s.name)}</span><span class="arrow">↗</span></a>`).join('') +
        '</div>';
    }

    app.innerHTML = html;

    // events
    app.querySelectorAll('.statbox.clickable').forEach(sb => sb.addEventListener('click', () => {
      f.view = sb.dataset.view; saveFilter(); build();
    }));
    app.querySelectorAll('.chip').forEach(ch => ch.addEventListener('click', () => {
      f[ch.dataset.k] = ch.dataset.v; saveFilter(); build();
    }));
    document.getElementById('q').addEventListener('input', e => { f.q = e.target.value; saveFilter(); renderList(); });
    document.getElementById('srcSel').addEventListener('change', e => { f.source = e.target.value; saveFilter(); renderList(); });
    document.getElementById('sortSel').addEventListener('change', e => { f.sort = e.target.value; saveFilter(); renderList(); });
    document.getElementById('unreadOnly').addEventListener('change', e => { f.unreadOnly = e.target.checked; saveFilter(); renderList(); });
    document.getElementById('showClosed').addEventListener('change', e => { f.hideClosed = !e.target.checked; saveFilter(); build(); });
    document.getElementById('btnAllRead').addEventListener('click', () => {
      if (!confirm('현재 목록의 모든 공고를 읽음 처리할까요?')) return;
      filteredGroups().forEach(g => setGroupRead(g, true));
      saveRead(); build();
    });
    document.getElementById('btnSrc').addEventListener('click', showSrcModal);
    document.getElementById('btnAdd').addEventListener('click', showAddModal);

    renderList();
  }

  // ---------- 사이트 추가 (로컬 앱 서버 필요) ----------
  let serverOn = null; // null=미확인, true/false
  async function api(path, body) {
    const opt = body ? { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
                     : { method: 'GET' };
    const r = await fetch(path, opt);
    return r.json();
  }
  // ---------- 공고 상세(안내) 전체 페이지 — dialog 없이 단순 오버레이 ----------
  function detailIsOpen() {
    const o = document.getElementById('detailOverlay');
    return o && o.style.display !== 'none';
  }
  // 전역으로 노출 → 버튼 inline onclick 이 항상 호출 가능 (스크립트 오류와 무관하게 닫힘)
  window.__closeDetail = function () {
    const o = document.getElementById('detailOverlay');
    if (o) o.style.display = 'none';
    document.body.style.overflow = '';
    // 뒤로가기로 열 때 쌓인 history 항목 정리 (버튼으로 닫아도 히스토리 어긋나지 않게)
    if (history.state && history.state.__detail) { try { history.back(); } catch (e) {} }
  };
  let currentDetailGroup = null;
  function openDetail(g) {
    currentDetailGroup = g;
    const url = (g && g.srcList && g.srcList[0]) ? g.srcList[0].url : null;
    document.getElementById('dTitle').textContent = (g && g.title) || '공고';
    document.getElementById('dTopTitle').textContent = (g && g.title) || '';
    document.getElementById('dMeta').innerHTML = g ? (
      (g.date ? `<span>등록 ${fmtDate(g.date)}</span>` : '') + ddayHtml(g) +
      `<span class="tag region ${g.region === '부산' ? 'busan' : ''}">${esc(g.region || '기타')}</span>` +
      (g.categories || []).map(c => `<span class="tag">${esc(c)}</span>`).join('')) : '';
    document.getElementById('dLinks').innerHTML = ((g && g.srcList) || []).map(s =>
      `<a href="${esc(s.url)}" target="_blank" rel="noopener">🔗 ${esc(s.sourceName)} 원본 열기</a>`).join('') +
      (url ? `<button type="button" class="d-sharebtn" id="dShareBtn">📤 공유</button>` : '');
    if (url) {
      const sb = document.getElementById('dShareBtn');
      if (sb) sb.addEventListener('click', () => openShare(g));
    }
    document.getElementById('dAttach').innerHTML = '';
    document.getElementById('dBody').innerHTML = url
      ? '<div class="d-loading">원본에서 내용을 불러오는 중… ⏳</div>'
      : '<div class="d-empty">원본 주소를 찾지 못했어요.</div>';

    const o = document.getElementById('detailOverlay');
    o.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    try { document.querySelector('.d-scroll').scrollTop = 0; } catch (e) {}
    try { history.pushState({ __detail: true }, ''); } catch (e) {}
    if (!url) return;

    api('/api/detail?url=' + encodeURIComponent(url)).then(j => {
      const body = document.getElementById('dBody');
      const att = document.getElementById('dAttach');
      if (!j || !j.ok) { body.innerHTML = '<div class="d-empty">내용을 불러오지 못했어요.<br>위 <b>원본 열기</b> 버튼으로 확인하세요.</div>'; return; }
      if (j.attachments && j.attachments.length) {
        att.innerHTML = '<div class="d-card"><div class="d-card-t">📎 공고문·첨부파일 ' + j.attachments.length + '개</div>' +
          j.attachments.map(a => {
            const dl = '/api/download?url=' + encodeURIComponent(a.url) +
              '&name=' + encodeURIComponent(a.name) + '&ref=' + encodeURIComponent(url);
            return `<a class="d-file" href="${dl}"><span class="d-ext ${esc(a.ext || 'file')}">${esc((a.ext || 'FILE').toUpperCase())}</span>` +
              `<span class="d-fn">${esc(a.name)}</span><span class="d-dl">내려받기 ↓</span></a>`;
          }).join('') + '</div>';
      }
      if (j.html && j.text_len > 5) {
        body.innerHTML = '<div class="d-card"><div class="d-card-t">📄 공고 내용</div><div class="d-content">' + j.html + '</div></div>';
      } else {
        body.innerHTML = '<div class="d-empty">본문 미리보기를 찾지 못했어요.<br>' +
          (j.attachments && j.attachments.length ? '위 첨부파일' : '위 원본 열기 버튼') + '에서 확인하세요.</div>';
      }
    }).catch(() => {
      document.getElementById('dBody').innerHTML =
        '<div class="d-empty">내용을 불러오지 못했어요.<br>위 <b>원본 열기</b> 버튼으로 확인하세요.</div>';
    });
  }
  (function wireDetail() {
    // 브라우저/폰 뒤로가기 → 상세 닫기 (히스토리는 이미 뒤로 간 상태이므로 화면만 숨김)
    window.addEventListener('popstate', () => {
      const o = document.getElementById('detailOverlay');
      if (o && o.style.display !== 'none') { o.style.display = 'none'; document.body.style.overflow = ''; }
    });
    // ESC 로 닫기
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && detailIsOpen()) window.__closeDetail(); });
    // 배경(어두운 부분) 클릭으로 닫기
    document.getElementById('detailOverlay').addEventListener('click', e => {
      if (e.target.id === 'detailOverlay') window.__closeDetail();
    });
  })();

  // ---------- 공고 공유 (카카오톡 / 텔레그램 / 링크복사) ----------
  const KAKAO_JS_KEY = (window.KAKAO_JS_KEY || '').trim();   // 설정.js 에서 키를 읽어옵니다.
  if (KAKAO_JS_KEY) {
    const s = document.createElement('script');
    s.src = 'https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js';
    s.onload = () => { try { window.Kakao && window.Kakao.init(KAKAO_JS_KEY); } catch (e) {} };
    document.head.appendChild(s);
  }
  let shareState = { url: '', title: '' };
  function shareMsg(t) { const m = document.getElementById('shareMsg'); if (m) m.textContent = t || ''; }
  function copyLink(url, okMsg) {
    const done = () => shareMsg(okMsg || '링크를 복사했어요!');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(done).catch(() => { legacyCopy(url); done(); });
    } else { legacyCopy(url); done(); }
  }
  function legacyCopy(url) {
    const i = document.getElementById('shareUrl');
    if (i) { i.focus(); i.select(); try { document.execCommand('copy'); } catch (e) {} }
  }
  window.__closeShare = function () {
    const o = document.getElementById('shareOverlay');
    if (o) o.style.display = 'none';
  };
  function openShare(g) {
    const url = (g && g.srcList && g.srcList[0]) ? g.srcList[0].url : null;
    if (!url) return;
    shareState = { url, title: (g && g.title) || '지원사업 공고' };
    document.getElementById('shareTitle').textContent = shareState.title;
    document.getElementById('shareUrl').value = url;
    shareMsg('');
    document.getElementById('shareOverlay').style.display = 'flex';
  }
  (function wireShare() {
    const o = document.getElementById('shareOverlay');
    o.addEventListener('click', e => { if (e.target.id === 'shareOverlay') window.__closeShare(); });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && o.style.display !== 'none') window.__closeShare();
    });
    document.getElementById('shareCopyBtn').addEventListener('click', () => copyLink(shareState.url));
    o.querySelectorAll('.share-btns button').forEach(btn => btn.addEventListener('click', () => {
      const { url, title } = shareState;
      const ch = btn.dataset.ch;
      if (ch === 'copy') { copyLink(url); return; }
      if (ch === 'telegram') {
        window.open('https://t.me/share/url?url=' + encodeURIComponent(url) +
          '&text=' + encodeURIComponent(title), '_blank', 'noopener');
        return;
      }
      if (ch === 'kakao') {
        if (KAKAO_JS_KEY && window.Kakao && window.Kakao.Share) {
          window.Kakao.Share.sendDefault({
            objectType: 'text', text: title + '\n' + url,
            link: { webUrl: url, mobileWebUrl: url },
          });
        } else if (navigator.share) {
          navigator.share({ title: title, url: url }).catch(() => {});
        } else {
          copyLink(url, '카카오톡 앱에 붙여넣어 공유하세요. (링크 복사됨)');
        }
      }
    }));
  })();

  let canAdd = false;   // 사이트 추가 가능(로컬 앱만). 상세보기는 serverOn 으로 판단.
  async function checkServer() {
    if (serverOn !== null) return serverOn;
    try {
      const j = await api('/api/ping');
      const feat = (j && j.features) || {};
      serverOn = !!(j && j.ok) && feat.detail !== false;
      canAdd = !!(j && j.ok) && feat.add === true;
    } catch (e) { serverOn = false; canAdd = false; }
    return serverOn;
  }

  async function showAddModal() {
    document.getElementById('addModal').showModal();
    await checkServer();
    const on = canAdd;   // 사이트 추가는 로컬 앱에서만
    document.getElementById('addServerOn').style.display = on ? '' : 'none';
    document.getElementById('addServerOff').style.display = on ? 'none' : '';
    if (on) renderCustomList();
  }

  async function renderCustomList() {
    const box = document.getElementById('customList');
    try {
      const j = await api('/api/sources');
      const list = (j.sources || []).filter(s => s.id && s.id.indexOf('cust_') === 0);
      box.innerHTML = list.map(s =>
        `<div class="crow"><span class="cnm">${esc(s.name)}</span>` +
        `<span class="ctag">${s.mode === 'auto' ? '자동수집' : '링크'}</span>` +
        `<span class="ctag">${esc(s.region || '')}</span>` +
        `<button class="cdel" data-id="${esc(s.id)}">삭제</button></div>`).join('');
      box.querySelectorAll('.cdel').forEach(b => b.addEventListener('click', async () => {
        if (!confirm('이 사이트를 목록에서 제거할까요?')) return;
        b.textContent = '삭제 중…';
        await api('/api/remove', { id: b.dataset.id });
        location.reload();
      }));
    } catch (e) { box.innerHTML = ''; }
  }

  function addResult(html) { document.getElementById('addResult').innerHTML = html; }

  async function doTest() {
    const url = document.getElementById('addUrl').value.trim();
    if (!url) { addResult('<span class="bad">링크를 입력하세요.</span>'); return; }
    addResult('확인 중… (사이트를 읽고 있어요)');
    try {
      const j = await api('/api/test', { url });
      if (!j.ok) { addResult(`<span class="bad">실패: ${esc(j.error || '알 수 없음')}</span>`); return; }
      if (!j.count) { addResult('<span class="bad">공고를 자동으로 찾지 못했어요.</span> 링크(바로가기)로만 추가하거나 주소를 확인해 주세요.'); return; }
      addResult(`<span class="good">${j.count}건 발견</span> — 미리보기:<ul>` +
        j.items.map(i => `<li>${esc(i.title)}${i.date ? ' · ' + esc(i.date) : ''}</li>`).join('') + '</ul>');
    } catch (e) { addResult('<span class="bad">서버에 연결하지 못했어요. 앱_시작.bat 으로 실행했는지 확인하세요.</span>'); }
  }

  async function doAdd() {
    const name = document.getElementById('addName').value.trim();
    const url = document.getElementById('addUrl').value.trim();
    const region = document.getElementById('addRegion').value;
    const autocrawl = document.getElementById('addAuto').checked;
    if (!url) { addResult('<span class="bad">링크를 입력하세요.</span>'); return; }
    addResult('추가하고 수집하는 중… 잠시만요 ⏳');
    try {
      const j = await api('/api/add', { name, url, region, autocrawl });
      if (!j.ok) { addResult(`<span class="bad">실패: ${esc(j.error || '알 수 없음')}</span>`); return; }
      const msg = j.mode === 'auto'
        ? `<span class="good">추가 완료 — ${j.count || 0}건 수집</span>`
        : '<span class="good">바로가기로 추가 완료</span>';
      addResult(msg + ' 잠시 후 새로고침됩니다…');
      setTimeout(() => location.reload(), 1200);
    } catch (e) { addResult('<span class="bad">서버에 연결하지 못했어요.</span>'); }
  }

  function filteredGroups() {
    const q = f.q.trim().toLowerCase();
    const base = f.view === 'saved' ? savedGroups() : openBase();
    return base.filter(g => {
      if (f.region !== '전체' && !(g.regions || []).includes(f.region)) return false;
      if (f.cat !== '전체' && !(g.categories || []).includes(f.cat)) return false;
      if (f.source !== '전체' && !(g.srcList || []).some(s => s.source === f.source)) return false;
      if (f.unreadOnly && groupRead(g)) return false;
      if (q && !((g.title || '').toLowerCase().includes(q) ||
                 (g.srcList || []).some(s => (s.sourceName || '').toLowerCase().includes(q)))) return false;
      return true;
    });
  }

  function sortGroups(groups) {
    const key = g => g.date || g.firstSeen || '';
    if (f.sort === 'dday') {
      return groups.slice().sort((a, b) => {
        const da = a.deadline && a.deadline >= todayStr ? a.deadline : '9999-12-31';
        const db = b.deadline && b.deadline >= todayStr ? b.deadline : '9999-12-31';
        return da === db ? key(b).localeCompare(key(a)) : da.localeCompare(db);
      });
    }
    const byDate = (a, b) => key(b).localeCompare(key(a));
    if (f.sort === 'date') return groups.slice().sort(byDate);
    // 미확인 우선 → 최신순
    return groups.slice().sort((a, b) => {
      const ra = groupRead(a) ? 1 : 0, rb = groupRead(b) ? 1 : 0;
      return ra !== rb ? ra - rb : byDate(a, b);
    });
  }

  function renderList() {
    const listEl = document.getElementById('list');
    const groups = sortGroups(filteredGroups());
    const rc = document.getElementById('rescount');
    if (rc) rc.textContent = groups.length ? `조건에 맞는 공고 ${groups.length}건` : '';
    if (!groups.length) {
      listEl.innerHTML = f.view === 'saved'
        ? '<div class="empty">저장한 공고가 없습니다.<br>공고 카드의 ⭐ 를 눌러 저장해 보세요.</div>'
        : '<div class="empty">조건에 맞는 공고가 없습니다.</div>';
      return;
    }
    listEl.innerHTML = groups.map(g => {
      const read = groupRead(g);
      const saved = groupSaved(g);
      const isNew = !read && g.firstSeen && daysBetween(g.firstSeen, todayStr) <= NEW_DAYS;
      const regionCls = g.region === '부산' ? 'busan' : '';
      const badges = (g.srcList || []).map(s =>
        `<a class="srcbadge" href="${esc(s.url)}" target="_blank" rel="noopener" data-src>${esc(s.sourceName)}<span class="ext">↗</span></a>`
      ).join('');
      const dup = (g.srcList || []).length > 1
        ? `<span class="dupflag" title="여러 사이트에 중복 게시됨">🔁 ${g.srcList.length}개 사이트</span>` : '';
      const primaryUrl = (g.srcList && g.srcList[0]) ? g.srcList[0].url : '#';
      return `<div class="card ${read ? 'read' : ''}" data-id="${esc(g.sid)}">
        <a class="title" href="${esc(primaryUrl)}" target="_blank" rel="noopener">${isNew ? '<span class="badge-new">NEW</span>' : ''}${esc(g.title)}</a>
        <div class="meta">
          ${g.date ? `<span>등록 ${fmtDate(g.date)}</span>` : ''}
          ${ddayHtml(g)}
          <span class="tag region ${regionCls}">${esc(g.region || '기타')}</span>
          ${(g.categories || []).map(c => `<span class="tag">${esc(c)}</span>`).join('')}
        </div>
        <div class="srcbadges">${dup}${badges}</div>
        <button class="sharebtn" title="공유">📤</button>
        <button class="savebtn ${saved ? 'on' : ''}" title="저장/해제">${saved ? '★' : '☆'}</button>
        <button class="readbtn" title="읽음/안읽음 전환">✓</button>
      </div>`;
    }).join('');

    const byKey = {};
    groups.forEach(g => byKey[g.sid] = g);
    listEl.querySelectorAll('.card').forEach(card => {
      const g = byKey[card.dataset.id];
      // 공유 버튼
      card.querySelector('.sharebtn').addEventListener('click', e => {
        e.preventDefault(); e.stopPropagation();
        openShare(g);
      });
      // 저장(북마크) 버튼
      card.querySelector('.savebtn').addEventListener('click', e => {
        e.preventDefault(); e.stopPropagation();
        toggleSave(g);
        if (f.view === 'saved') { build(); }   // 저장함 뷰에선 목록에서 빠지므로 재빌드
        else {
          const b = card.querySelector('.savebtn');
          const on = groupSaved(g);
          b.classList.toggle('on', on); b.textContent = on ? '★' : '☆';
          updateSavedCount();
        }
      });
      // 읽음 토글 버튼
      card.querySelector('.readbtn').addEventListener('click', e => {
        e.preventDefault(); e.stopPropagation();
        setGroupRead(g, !groupRead(g));
        saveRead(); updateUnreadCount(); renderList();
        return;
      });
      const markSeen = () => {
        if (!groupRead(g)) {
          setGroupRead(g, true); saveRead();
          card.classList.add('read');
          const nb = card.querySelector('.badge-new'); if (nb) nb.remove();
          updateUnreadCount();
        }
      };
      // 제목 클릭 → 앱 실행 중이면 사이트 내 안내 팝업, 아니면 원본 새 탭
      card.querySelector('.title').addEventListener('click', e => {
        markSeen();
        if (serverOn) { e.preventDefault(); openDetail(g); }
      });
      // 출처 배지 클릭 → 해당 사이트 원문 새 탭 + 읽음 처리
      card.querySelectorAll('.srcbadge').forEach(a => a.addEventListener('click', markSeen));
    });
  }

  function updateUnreadCount() {
    const el = document.getElementById('unreadCnt');
    if (el) el.textContent = openBase().filter(g => !groupRead(g)).length;
  }

  function updateSavedCount() {
    const box = document.querySelector('.statbox.saved b');
    if (box) box.textContent = Object.keys(savedMap).length;
  }

  function showSrcModal() {
    const box = document.getElementById('srcList');
    const okCnt = sources.filter(s => s.status === 'ok').length;
    const failCnt = sources.filter(s => s.status === 'fail').length;
    const linkCnt = sources.filter(s => s.status === 'link-only').length;
    const info = `<div class="modal-info">
      <div class="when">🕒 마지막 수집: ${fmtDateTime(DATA.generatedAt) || '기록 없음'}</div>
      <div style="margin-top:4px">📌 <b>수집 기준</b> — 각 기관의 진행중·모집중 공고 게시판에서:</div>
      <ul>
        <li>아직 <b>마감일이 지나지 않은</b> 유효한 공고</li>
        <li>여기에 더해 <b>새로 올라온 공고</b>를 최신순으로</li>
        <li>2시간마다 자동 갱신 (마감된 공고는 목록에서 회색 <b>마감</b> 표시)</li>
      </ul></div>
      <div class="modal-legend">
        <span><span class="dot ok"></span>수집 성공 ${okCnt}</span>
        <span><span class="dot fail"></span>수집 실패 ${failCnt}</span>
        <span><span class="dot link"></span>링크만 ${linkCnt}</span>
      </div>`;
    const rows = sources.map(s => {
      const dot = s.status === 'ok' ? 'ok' : s.status === 'link-only' ? 'link' : 'fail';
      const label = s.status === 'ok' ? `${s.count}건` : s.status === 'link-only' ? '링크만' : '수집 실패';
      return `<div class="srcrow"><span class="dot ${dot}"></span><a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)}</a><span class="cnt">${label}</span></div>`;
    }).join('');
    box.innerHTML = info + rows;
    document.getElementById('srcModal').showModal();
  }

  // header updated time (+ 빌드 버전 표시로 최신본 로드 여부 확인)
  const BUILD = '2026-07-09.19';
  console.log('[지원사업 대시보드] build ' + BUILD);
  // 자동 최신화: 서버 버전이 페이지 버전보다 새로우면 1회 강제 새로고침(캐시 우회)
  (function selfHeal() {
    fetch('/api/version?_=' + Date.now(), { cache: 'no-store' }).then(r => r.json()).then(j => {
      if (j && j.version && j.version !== BUILD) {
        const k = 'bizdash_reloaded_' + j.version;
        if (!sessionStorage.getItem(k)) {
          sessionStorage.setItem(k, '1');
          location.replace('/index.html?v=' + encodeURIComponent(j.version));
        }
      }
    }).catch(() => {});
  })();
  document.getElementById('updated').textContent =
    (DATA.generatedAt ? '마지막 수집: ' + fmtDateTime(DATA.generatedAt) + '  ·  ' : '') + 'v' + BUILD;

  // 왼쪽 사이트 바로가기 사이드바 채우기 (수집 중인 사이트 + 링크만)
  (function buildSiteNav() {
    const nav = document.getElementById('siteNav');
    if (!nav) return;
    const row = s => `<a href="${esc(s.url)}" target="_blank" rel="noopener" title="${esc(s.name)}">` +
      `<span class="dot ${s.status === 'ok' ? 'ok' : s.status === 'link-only' ? 'link' : 'fail'}"></span>` +
      `<span class="snm">${esc(s.name)}</span><span class="sarrow">↗</span></a>`;
    let h = '<h3>🔗 사이트 바로가기</h3>';
    if (scrapedSources.length) h += '<div class="sub">수집 중인 사이트</div>' + scrapedSources.map(row).join('');
    if (linkOnlySources.length) h += '<div class="sub">직접 확인 사이트</div>' + linkOnlySources.map(row).join('');
    nav.innerHTML = h;
  })();

  // 사이트 추가 모달 버튼 (정적 요소 → 1회 바인딩)
  document.getElementById('btnTest').addEventListener('click', doTest);
  document.getElementById('btnDoAdd').addEventListener('click', doAdd);

  checkServer();   // 앱 서버 여부 미리 확인 (제목 클릭 시 안내팝업/원본 분기)
  build();
})();
</script>
</body>
</html>
